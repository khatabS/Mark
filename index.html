<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رصد الدرجات الشاملة</title>
    <style>
        :root {
            --bg-color: #f4f7f6; --text-color: #2c3e50; --card-bg: #ffffff;
            --border-color: #ddd; --input-bg: #fff; --primary-color: #3498db;
            --success-color: #27ae60; --warning-color: #e67e22; --purple-color: #8e44ad;
            --report-color: #16a085;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; padding-bottom: 100px; margin: 0; }
        .container { max-width: 1300px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--text-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 25px; }
        
        .controls { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        select, button, input[type="text"], input[type="number"] { padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 15px; font-family: inherit;}
        select { background-color: var(--input-bg); min-width: 130px; cursor: pointer; }
        
        button { font-weight: bold; cursor: pointer; transition: 0.3s; color: white; border: none; }
        .btn-fetch { background-color: var(--primary-color); } .btn-fetch:hover { background-color: #2980b9; }
        .btn-add { background-color: var(--success-color); } .btn-add:hover { background-color: #2ecc71; }
        .btn-bulk { background-color: var(--purple-color); } .btn-bulk:hover { background-color: #9b59b6; }
        .btn-report { background-color: var(--report-color); font-size: 16px; padding: 12px 20px;} .btn-report:hover { background-color: #1abc9c; }

        .floating-save-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 999; }
        .btn-save-floating { background-color: var(--warning-color); padding: 15px 50px; font-size: 20px; border-radius: 50px; box-shadow: 0 6px 20px rgba(230, 126, 34, 0.4); border: 2px solid #fff; }
        .btn-save-floating:hover { background-color: #d35400; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(211, 84, 0, 0.5); }
        .btn-save-floating:disabled { background-color: #95a5a6; cursor: not-allowed; box-shadow: none; transform: none;}

        .bulk-add-container { background: #fdfefe; padding: 15px; border-radius: 8px; border: 2px dashed #bdc3c7; margin-bottom: 20px; }
        .bulk-add-container textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #bdc3c7; margin-bottom: 10px; font-family: inherit; resize: vertical; box-sizing: border-box; }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; flex-wrap: wrap;}
        
        .table-responsive { overflow-x: auto; margin-bottom: 30px; border-radius: 8px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { border: 1px solid var(--border-color); padding: 10px 6px; text-align: center; }
        th { background-color: #ecf0f1; color: #2c3e50; font-weight: bold; }
        
        input.s-name { width: 200px; }
        input[type="number"] { width: 50px; text-align: center; font-weight: bold; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .row-number { font-weight: bold; color: #7f8c8d; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal-content { background-color: #f9f9f9; margin: 2% auto; padding: 25px; border-radius: 12px; width: 95%; max-width: 900px; max-height: 90vh; overflow-y: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .close-btn { color: #e74c3c; float: left; font-size: 35px; font-weight: bold; cursor: pointer; line-height: 1; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; border: 2px solid #bdc3c7; font-size: 16px; box-sizing: border-box;}
        
        .student-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { background-color: #34495e; color: #fff; padding: 12px 15px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 15px; }
        .cat-box { background-color: #f8f9fa; border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin-bottom: 10px; display: flex; flex-direction: column; border-right: 5px solid #ccc; }
        .cat-title { font-weight: bold; color: #2c3e50; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .cat-score { background: #ecf0f1; padding: 2px 8px; border-radius: 4px; font-size: 14px; direction: ltr;}
        .cat-desc { font-size: 14px; color: #555; line-height: 1.5; }
        .whatsapp-section { background: #fdfefe; border: 1px solid #e8e8e8; border-radius: 8px; padding: 15px; margin-top: 15px; }
        .phone-input-wrapper { display: flex; align-items: center; direction: ltr; justify-content: flex-end; width: max-content; }
        .phone-prefix { background: #ecf0f1; border: 1px solid #ccc; border-right: none; padding: 10px; border-radius: 5px 0 0 5px; font-weight: bold; color: #2c3e50; }
        .modal-phone-input { border: 1px solid #ccc; padding: 10px; border-radius: 0 5px 5px 0; width: 140px; text-align: left; font-size: 16px; letter-spacing: 1px; }
        .whatsapp-btn { background-color: #25D366; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; margin-top: 10px; transition: 0.2s;}
        .whatsapp-btn:hover { background-color: #128C7E; transform: scale(1.02); }
        .border-exc { border-right-color: #27ae60; } .border-vgood { border-right-color: #2980b9; } .border-good { border-right-color: #f1c40f; } .border-weak { border-right-color: #e74c3c; } .border-none { border-right-color: #95a5a6; }
    </style>
</head>
<body>

<div class="container">
    <h2>منصة رصد الدرجات والتقارير الوصفية</h2>
    
    <div class="controls">
        <select id="grade" onchange="updateHeaders()">
            <option value="5">الصف الخامس (6 شعب)</option>
            <option value="7">الصف السابع (5 شعب)</option>
        </select>
        <select id="section" onchange="clearTable()">
            <option value="1">شعبة 1</option><option value="2">شعبة 2</option>
            <option value="3">شعبة 3</option><option value="4">شعبة 4</option>
            <option value="5">شعبة 5</option><option value="6">شعبة 6</option>
        </select>
        <button class="btn-fetch" onclick="fetchExistingStudents(this)">🔄 جلب الأسماء والدرجات</button>
    </div>

    <div class="bulk-add-container">
        <h4>📥 إضافة مجموعة أسماء دفعة واحدة</h4>
        <textarea id="bulkNamesTextarea" rows="3" placeholder="انسخ قائمة الأسماء من إكسل والصقها هنا..."></textarea>
        <button class="btn-bulk" onclick="addBulkNames()">+ تحويل الأسماء إلى صفوف</button>
    </div>

    <div class="action-bar">
        <div><button class="btn-add" onclick="addNewRow()">+ إضافة طالب جديد</button></div>
        <button class="btn-report" onclick="openReportsModal()">📊 لوحة التقارير الوصفية والواتساب</button>
    </div>

    <div class="table-responsive">
        <table id="gradesTable">
            <thead id="tableHead">
                </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="floating-save-container">
    <button id="saveBtn" class="btn-save-floating" onclick="submitData()">💾 حفظ البيانات في جوجل شيت</button>
</div>

<div id="reportsModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeReportsModal()">&times;</span>
        <h2 style="border:none;">التقارير التحليلية والتواصل</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث عن طالب..." onkeyup="filterReports()">
        <div id="reportsContainer"></div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxs5s4NKNsTe_XUEtln7JJFVxFgFK4aViRd0k5qLGb1uuwlUebqTWXdi1RbAS4PkckDgQ/exec';
    let rowCount = 0;

    // تحديث العناوين عند تغيير الصف
    function updateHeaders() {
        const grade = document.getElementById('grade').value;
        const thead = document.getElementById('tableHead');
        if (grade === "5") {
            thead.innerHTML = `<tr><th>م</th><th>اسم الطالب</th><th>حوار(1)</th><th>حوار(2)</th><th>س ق(1)</th><th>س ق(2)</th><th>س ق(3)</th><th>س ق(4)</th><th>عملي(1)</th><th>عملي(2)</th><th>مشروع</th></tr>`;
        } else {
            thead.innerHTML = `<tr><th>م</th><th>اسم الطالب</th><th>حوار(1)</th><th>حوار(2)</th><th>عملي(1)</th><th>عملي(2)</th><th>اختبار</th><th>مشروع</th></tr>`;
        }
        clearTable();
    }

    function clearTable() {
        document.getElementById('tableBody').innerHTML = '';
        rowCount = 0;
    }

    function addNewRow(data = []) {
        const grade = document.getElementById('grade').value;
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        row.className = 'student-row';
        rowCount++;

        let cells = `<td class="row-number">${rowCount}</td>
                     <td><input type="text" class="s-name" value="${data[0] || ''}" placeholder="اسم الطالب">
                         <input type="hidden" class="s-phone" value="${grade === "5" ? (data[14] || '') : (data[10] || '')}"></td>
                     <td><input type="number" class="s-d1" value="${data[1] !== undefined ? data[1] : ''}"></td>
                     <td><input type="number" class="s-d2" value="${data[2] !== undefined ? data[2] : ''}"></td>`;

        if (grade === "5") {
            cells += `<td><input type="number" class="s-q1" value="${data[4] !== undefined ? data[4] : ''}"></td>
                      <td><input type="number" class="s-q2" value="${data[5] !== undefined ? data[5] : ''}"></td>
                      <td><input type="number" class="s-q3" value="${data[6] !== undefined ? data[6] : ''}"></td>
                      <td><input type="number" class="s-q4" value="${data[7] !== undefined ? data[7] : ''}"></td>
                      <td><input type="number" class="s-a1" value="${data[9] !== undefined ? data[9] : ''}"></td>
                      <td><input type="number" class="s-a2" value="${data[10] !== undefined ? data[10] : ''}"></td>
                      <td><input type="number" class="s-proj" value="${data[12] !== undefined ? data[12] : ''}"></td>`;
        } else {
            cells += `<td><input type="number" class="s-a1" value="${data[4] !== undefined ? data[4] : ''}"></td>
                      <td><input type="number" class="s-a2" value="${data[5] !== undefined ? data[5] : ''}"></td>
                      <td><input type="number" class="s-test" value="${data[7] !== undefined ? data[7] : ''}"></td>
                      <td><input type="number" class="s-proj" value="${data[8] !== undefined ? data[8] : ''}"></td>`;
        }
        row.innerHTML = cells;
        tbody.appendChild(row);
    }

    // باقي الوظائف (fetchExistingStudents, submitData, etc.) يتم تحديث منطق الجمع فيها لتناسب الأعمدة الجديدة
    async function fetchExistingStudents(btn) {
        if(scriptURL === 'ضع_الرابط_هنا'){ alert("يرجى وضع الرابط!"); return; }
        const grade = document.getElementById('grade').value;
        const section = document.getElementById('section').value;
        btn.innerHTML = "⏳ جاري الجلب..."; btn.disabled = true;
        try {
            const response = await fetch(`${scriptURL}?grade=${grade}&section=${section}`);
            const result = await response.json();
            clearTable();
            if (result.result === "success" && result.data.length > 0) {
                result.data.forEach(studentData => addNewRow(studentData));
            }
        } catch (e) { alert("حدث خطأ في الاتصال."); }
        btn.innerHTML = "🔄 جلب الأسماء والدرجات"; btn.disabled = false;
    }

    function submitData() {
        const grade = document.getElementById('grade').value;
        const section = document.getElementById('section').value;
        const students = [];
        document.querySelectorAll('.student-row').forEach(row => {
            const name = row.querySelector('.s-name').value.trim();
            if (name) {
                let sObj = { name: name, phone: row.querySelector('.s-phone').value, d1: row.querySelector('.s-d1').value, d2: row.querySelector('.s-d2').value, a1: row.querySelector('.s-a1').value, a2: row.querySelector('.s-a2').value, proj: row.querySelector('.s-proj').value };
                if (grade === "5") {
                    sObj.q1 = row.querySelector('.s-q1').value; sObj.q2 = row.querySelector('.s-q2').value; sObj.q3 = row.querySelector('.s-q3').value; sObj.q4 = row.querySelector('.s-q4').value;
                } else {
                    sObj.test = row.querySelector('.s-test').value;
                }
                students.push(sObj);
            }
        });
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerHTML = "⏳ جاري الحفظ..."; saveBtn.disabled = true;
        fetch(scriptURL, { method: 'POST', body: JSON.stringify({ grade, section, students }) })
        .then(res => res.json()).then(res => {
            alert(res.result === "success" ? "✅ تم الحفظ!" : "❌ خطأ");
            saveBtn.innerHTML = "💾 حفظ البيانات في جوجل شيت"; saveBtn.disabled = false;
        });
    }

    // تهيئة العناوين عند التحميل
    updateHeaders();

    // يتم تضمين باقي وظائف التقارير والواتساب مع تعديل طفيف لحساب مجموع الصف الخامس
    // (دوال getPhrase, updatePhoneAndLink, closeReportsModal, filterReports تبقى كما هي)
</script>
</body>
</html>
