<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رصد الدرجات الشاملة</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #2c3e50; --card-bg: #ffffff;
            --border-color: #ddd; --input-bg: #fff; --primary-color: #3498db;
            --success-color: #27ae60; --warning-color: #e67e22; --purple-color: #8e44ad;
            --report-color: #16a085;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color);
        color: var(--text-color); padding: 20px; padding-bottom: 100px; margin: 0; }
        .container { max-width: 1200px;
        margin: auto; background: var(--card-bg); padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: var(--text-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 10px;
        margin-bottom: 25px; }
        
        .controls { display: flex;
        gap: 15px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);
        }
        select, button, input[type="text"], input[type="number"] { padding: 10px; border-radius: 6px;
        border: 1px solid var(--border-color); font-size: 15px; font-family: inherit;}
        select { background-color: var(--input-bg);
        min-width: 130px; cursor: pointer; }
        
        button { font-weight: bold;
        cursor: pointer; transition: 0.3s; color: white; border: none; }
        .btn-fetch { background-color: var(--primary-color);
        } .btn-fetch:hover { background-color: #2980b9; }
        .btn-add { background-color: var(--success-color);
        } .btn-add:hover { background-color: #2ecc71; }
        .btn-bulk { background-color: var(--purple-color);
        } .btn-bulk:hover { background-color: #9b59b6; }
        .btn-report { background-color: var(--report-color); font-size: 16px;
        padding: 12px 20px;} .btn-report:hover { background-color: #1abc9c; }

        /* زر الحفظ العائم */
        .floating-save-container { position: fixed;
        bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 999; }
        .btn-save-floating { background-color: var(--warning-color);
        padding: 15px 50px; font-size: 20px; border-radius: 50px; box-shadow: 0 6px 20px rgba(230, 126, 34, 0.4); border: 2px solid #fff;
        }
        .btn-save-floating:hover { background-color: #d35400; transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(211, 84, 0, 0.5); }
        .btn-save-floating:disabled { background-color: #95a5a6;
        cursor: not-allowed; box-shadow: none; transform: none;}

        .bulk-add-container { background: #fdfefe; padding: 15px;
        border-radius: 8px; border: 2px dashed #bdc3c7; margin-bottom: 20px; }
        .bulk-add-container textarea { width: 100%;
        padding: 10px; border-radius: 5px; border: 1px solid #bdc3c7; margin-bottom: 10px; font-family: inherit; resize: vertical; box-sizing: border-box;
        }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px;
        flex-wrap: wrap;}
        
        .table-responsive { overflow-x: auto;
        margin-bottom: 30px; border-radius: 8px; border: 1px solid var(--border-color); }
        table { width: 100%;
        border-collapse: collapse; white-space: nowrap; }
        th, td { border: 1px solid var(--border-color);
        padding: 10px 6px; text-align: center; }
        th { background-color: #ecf0f1; color: #2c3e50;
        font-weight: bold; }
        
        input.s-name { width: 220px;
        }
        input[type="number"] { width: 55px; text-align: center; font-weight: bold;
        }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0;
        }
        .row-number { font-weight: bold; color: #7f8c8d;
        }

        /* نافذة التقارير */
        .modal { display: none;
        position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
        }
        .modal-content { background-color: #f9f9f9; margin: 2% auto; padding: 25px; border-radius: 12px;
        width: 95%; max-width: 900px; max-height: 90vh; overflow-y: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .close-btn { color: #e74c3c; float: left; font-size: 35px; font-weight: bold; cursor: pointer;
        line-height: 1; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px;
        border: 2px solid #bdc3c7; font-size: 16px; box-sizing: border-box;}
        
        .student-card { background: #fff;
        border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden;
        }
        .card-header { background-color: #34495e; color: #fff; padding: 12px 15px; font-size: 18px;
        font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 15px;
        }
        
        .cat-box { background-color: #f8f9fa;
        border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin-bottom: 10px; display: flex; flex-direction: column; border-right: 5px solid #ccc;
        }
        .cat-title { font-weight: bold; color: #2c3e50; display: flex; justify-content: space-between; margin-bottom: 5px;
        }
        .cat-score { background: #ecf0f1; padding: 2px 8px; border-radius: 4px; font-size: 14px;
        direction: ltr;}
        .cat-desc { font-size: 14px; color: #555; line-height: 1.5;
        }
        
        /* قسم الواتساب */
        .whatsapp-section { background: #fdfefe;
        border: 1px solid #e8e8e8; border-radius: 8px; padding: 15px; margin-top: 15px;
        }
        .phone-input-wrapper { display: flex; align-items: center; direction: ltr; justify-content: flex-end; width: max-content;
        }
        .phone-prefix { background: #ecf0f1; border: 1px solid #ccc; border-right: none; padding: 10px;
        border-radius: 5px 0 0 5px; font-weight: bold; color: #2c3e50; }
        .modal-phone-input { border: 1px solid #ccc;
        padding: 10px; border-radius: 0 5px 5px 0; width: 140px; text-align: left; font-size: 16px; letter-spacing: 1px;
        }
        .whatsapp-btn { background-color: #25D366; color: white; border: none; padding: 10px 15px;
        border-radius: 5px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; margin-top: 10px;
        transition: 0.2s;}
        .whatsapp-btn:hover { background-color: #128C7E; transform: scale(1.02);
        }
        
        .border-exc { border-right-color: #27ae60;
        } .border-vgood { border-right-color: #2980b9; }
        .border-good { border-right-color: #f1c40f;
        } .border-weak { border-right-color: #e74c3c; } .border-none { border-right-color: #95a5a6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>منصة رصد الدرجات والتقارير الوصفية</h2>
    
    <div class="controls">
        <select id="grade" onchange="clearTable()">
            <option value="5">الصف الخامس</option>
            <option value="7">الصف السابع</option>
        </select>
        <select id="section" onchange="clearTable()">
            <option value="1">شعبة 1</option><option value="2">شعبة 2</option>
            <option value="3">شعبة 3</option><option value="4">شعبة 4</option>
            <option value="5">شعبة 5</option><option value="6">شعبة 6</option>
        </select>
        <button class="btn-fetch" onclick="fetchExistingStudents(this)">🔄 جلب الأسماء والدرجات</button>
    </div>

    <div class="bulk-add-container">
        <h4>📥 إضافة مجموعة أسماء دفعة واحدة</h4>
        <textarea id="bulkNamesTextarea" rows="3" placeholder="انسخ قائمة الأسماء من إكسل (اسم في كل سطر) والصقها هنا..."></textarea>
        <button class="btn-bulk" 
        onclick="addBulkNames()">+ تحويل الأسماء إلى صفوف</button>
    </div>

    <div class="action-bar">
        <div>
            <button class="btn-add" onclick="addNewRow()">+ إضافة طالب جديد</button>
        </div>
        <button class="btn-report" onclick="openReportsModal()">📊 لوحة التقارير الوصفية والواتساب</button>
    </div>

    <div class="table-responsive">
        <table id="gradesTable">
            <thead>
                <tr>
                    <th>م</th>
                    <th>اسم الطالب</th>
                    <th>حوار(1)</th><th>حوار(2)</th>
                    <th>عملي(1)</th><th>عملي(2)</th>
                    <th>اختبار</th><th>مشروع</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="floating-save-container">
    <button id="saveBtn" class="btn-save-floating" onclick="submitData()">💾 حفظ البيانات في جوجل شيت</button>
</div>

<div id="reportsModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeReportsModal()">&times;</span>
        <h2 style="border:none;
        margin-bottom:10px;">التقارير التحليلية والتواصل</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث عن طالب بالاسم أو برقم التسلسل (م)..." onkeyup="filterReports()">
        <div id="reportsContainer">
            </div>
    </div>
</div>

<script>
    // ==========================================
    // ⚠️ تنبيه: ضع الرابط الخاص بك هنا 
    // ==========================================
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyAY7hRvHTyHSrUP8IwsPJqMNt46uHCmPyCoUfbEhokQSKbzmeObqNqhilP5vXnvFkZjw/exec';
    
    let rowCount = 0; 

    function clearTable() {
        document.getElementById('tableBody').innerHTML = '';
        rowCount = 0;
    }

    function addNewRow(data = []) {
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        row.className = 'student-row';
        rowCount++;

        row.innerHTML = `
            <td class="row-number">${rowCount}</td>
            <td>
                <input type="text" class="s-name" value="${data[0] || ''}" placeholder="اسم الطالب">
                <input type="hidden" id="st-phone-${rowCount}" class="s-phone" value="${data[10] || ''}">
            </td>
            <td><input type="number" class="s-d1" max="10" value="${data[1] !== undefined ? data[1] : ''}"></td>
            <td><input type="number" class="s-d2" max="10" value="${data[2] !== undefined ? data[2] : ''}"></td>
            <td><input type="number" class="s-a1" max="20" value="${data[4] !== undefined ? data[4] : ''}"></td>
            <td><input type="number" class="s-a2" max="20" value="${data[5] !== undefined ? data[5] : ''}"></td>
            <td><input type="number" class="s-test" max="20" value="${data[7] !== undefined ? data[7] : ''}"></td>
            <td><input type="number" class="s-proj" max="20" value="${data[8] !== undefined ? data[8] : ''}"></td>
        `;
        tbody.appendChild(row);
    }

    function addBulkNames() {
        const textarea = document.getElementById('bulkNamesTextarea');
        const lines = textarea.value.split('\n');
        lines.forEach(line => {
            if (line.trim() !== '') addNewRow([line.trim()]); 
        });
        textarea.value = ''; 
    }

    async function fetchExistingStudents(btn) {
        if(scriptURL === 'ضع_الرابط_هنا'){ alert("يرجى وضع الرابط أولاً!"); return; }
        const grade = document.getElementById('grade').value;
        const section = document.getElementById('section').value;
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ جاري الجلب..."; btn.disabled = true;
        
        try {
            const response = await fetch(`${scriptURL}?grade=${grade}&section=${section}`);
            const result = await response.json();
            clearTable();
            if (result.result === "success" && result.data.length > 0) {
                result.data.forEach(studentData => addNewRow(studentData));
            } else { alert("الورقة فارغة. ابدأ بإضافة الطلاب."); }
        } catch (e) { alert("حدث خطأ في الاتصال.");
        }
        btn.innerHTML = originalText; btn.disabled = false;
    }

    function submitData() {
        if(scriptURL === 'ضع_الرابط_هنا'){ alert("يرجى وضع الرابط أولاً!");
        return; }
        const grade = document.getElementById('grade').value;
        const section = document.getElementById('section').value;
        const students = [];
        
        document.querySelectorAll('.student-row').forEach(row => {
            const nameInput = row.querySelector('.s-name').value.trim();
            if (nameInput !== "") { 
                students.push({
                    name: nameInput,
                    phone: row.querySelector('.s-phone').value.trim(), 
                    d1: row.querySelector('.s-d1').value,
                    d2: row.querySelector('.s-d2').value,
                    a1: row.querySelector('.s-a1').value,
                    a2: row.querySelector('.s-a2').value,
                    test: row.querySelector('.s-test').value,
                    proj: row.querySelector('.s-proj').value
                });
            }
        });
        if (students.length === 0) { alert("لا توجد بيانات لحفظها!"); return;
        }

        const saveBtn = document.getElementById('saveBtn');
        const originalText = saveBtn.innerHTML;
        saveBtn.innerHTML = "⏳ جاري الحفظ..."; saveBtn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: JSON.stringify({ grade, section, students }) })
        .then(res => res.json())
        .then(res => {
            if(res.result === "success") alert("✅ تم حفظ البيانات في جوجل شيت!");
            else alert("❌ خطأ: " + res.message);
            saveBtn.innerHTML = originalText; saveBtn.disabled = false;
        }).catch(e => { alert("❌ خطأ في الاتصال!"); saveBtn.innerHTML = originalText; saveBtn.disabled = false; });
    }

    // ==========================================
    // محرك التقارير والعبارات الوصفية الديناميكي
    // ==========================================
    function getPhrase(type, percent) {
        if(isNaN(percent)) return { text: "لم يتم رصد الدرجة بعد.", class: "border-none" };
        if (type === "dialogue") {
            if (percent >= 90) return { text: "ممتاز جداً في التعبير عن أفكاره، يشارك بفاعلية ويثري الحوار الصفي.", class: "border-exc" };
            if (percent >= 75) return { text: "مشاركته جيدة جداً، يتفاعل بشكل إيجابي أثناء الشرح والمناقشة.", class: "border-vgood" };
            if (percent >= 50) return { text: "تفاعله مقبول، ينصح بتحفيزه على المشاركة والتعبير عن رأيه بثقة أكبر.", class: "border-good" };
            return { text: "نادر المشاركة في الحوار. يحتاج إلى دعم مكثف وتشجيع مستمر لكسر حاجز الخجل.", class: "border-weak" };
        }
        if (type === "activity") {
            if (percent >= 90) return { text: "ينجز المهارات والأنشطة العملية بدقة واحترافية عالية تفوق التوقعات.", class: "border-exc" };
            if (percent >= 75) return { text: "أداؤه في الأنشطة العملية جيد جداً، وينهي مهامه في الوقت المحدد.", class: "border-vgood" };
            if (percent >= 50) return { text: "يطبق المهارات بشكل مرضي، ولكنه بحاجة لمزيد من التركيز على الدقة.", class: "border-good" };
            return { text: "يواجه صعوبات ملحوظة في الجانب العملي، يحتاج لتدريب وتطبيق منزلي مكثف.", class: "border-weak" };
        }
        if (type === "test") {
            if (percent >= 90) return { text: "استيعاب ممتاز للمفاهيم النظرية، إجاباته دقيقة وتدل على مراجعة ممتازة.", class: "border-exc" };
            if (percent >= 75) return { text: "مستواه في الاختبارات جيد جداً، مع بعض الأخطاء البسيطة التي يمكن تداركها.", class: "border-vgood" };
            if (percent >= 50) return { text: "مستوى الإنجاز متوسط، يتطلب الأمر زيادة ساعات الاستذكار بالمنزل.", class: "border-good" };
            return { text: "درجات الاختبار ضعيفة. نرجو من ولي الأمر المتابعة الحثيثة لاستذكار الطالب.", class: "border-weak" };
        }
        if (type === "project") {
            if (percent >= 90) return { text: "إنجاز إبداعي ومتقن للمشروع، يعكس فهماً عميقاً وقدرة عالية على البحث والتنفيذ.", class: "border-exc" };
            if (percent >= 75) return { text: "نفذ المشروع بشكل جيد جداً، مع الالتزام بأغلب المعايير المطلوبة.", class: "border-vgood" };
            if (percent >= 50) return { text: "تسليم المشروع كان بجهد مقبول، ولكن كان بالإمكان تقديمه بصورة أفضل وأكثر شمولية.", class: "border-good" };
            return { text: "المشروع غير مكتمل أو ضعيف جداً، يحتاج للاهتمام بجودة تسليم المتطلبات.", class: "border-weak" };
        }
        if (type === "total") {
            if (percent >= 90) return { text: "مستوى الطالب العام متميز، نتمنى له الاستمرار على هذا التفوق.", class: "border-exc" };
            if (percent >= 75) return { text: "مستوى الطالب العام جيد جداً، ويمتلك القدرة على الوصول للامتياز.", class: "border-vgood" };
            if (percent >= 50) return { text: "مستوى الطالب العام مرضي، ونطمح لجهد أكبر للارتقاء بمستواه.", class: "border-good" };
            return { text: "مستوى الطالب يحتاج لمتابعة عاجلة وخطة علاجية للنهوض بمستواه الأكاديمي.", class: "border-weak" };
        }
    }

    // تحديث الرقم ديناميكياً للواتساب باستخدام api.whatsapp.com
    function updatePhoneAndLink(rowId, newPhone) {
        let cleanPhone = newPhone.replace(/\D/g, '');
        document.getElementById(`st-phone-${rowId}`).value = cleanPhone;
        
        const waBtn = document.getElementById(`wa-btn-${rowId}`);
        const warning = document.getElementById(`wa-warn-${rowId}`);
        const rawMsg = decodeURIComponent(waBtn.getAttribute('data-msg'));
        if(cleanPhone.length === 8) {
            let fullPhone = '968' + cleanPhone;
            // استخدام رابط API الرسمي لضمان الفتح على كل المنصات
            waBtn.href = `https://api.whatsapp.com/send?phone=${fullPhone}&text=${encodeURIComponent(rawMsg)}`;
            waBtn.style.display = 'inline-flex';
            if(warning) warning.style.display = 'none';
        } else {
            waBtn.removeAttribute('href');
            waBtn.style.display = 'none';
            if(warning) warning.style.display = 'block';
        }
    }

    function openReportsModal() {
        const container = document.getElementById('reportsContainer');
        container.innerHTML = '';
        
        const rows = document.querySelectorAll('.student-row');
        if(rows.length === 0) { alert("الجدول فارغ! اجلب البيانات أو أضف طلاباً أولاً."); return;
        }

        rows.forEach(row => {
            const num = row.querySelector('.row-number').innerText;
            const name = row.querySelector('.s-name').value.trim();
            
            let phoneRaw = row.querySelector('.s-phone').value.trim();
            let cleanPhone = phoneRaw.replace(/\D/g, '');
            if(cleanPhone.startsWith('968') && cleanPhone.length === 11) 
            {
                cleanPhone = cleanPhone.substring(3);
            }

            if(!name) return;

            const d1 = Number(row.querySelector('.s-d1').value) || 0;
            const d2 = Number(row.querySelector('.s-d2').value) || 0;
            const a1 = Number(row.querySelector('.s-a1').value) || 0;
            const a2 = Number(row.querySelector('.s-a2').value) || 0;
            const test = Number(row.querySelector('.s-test').value) || 0;
            const proj = Number(row.querySelector('.s-proj').value) || 0;

            const dTot = d1 + d2; const aTot = a1 + a2;
            const grandTot = dTot + aTot + test + proj;
            const pDiag = getPhrase("dialogue", dTot > 0 ? (dTot/20)*100 : NaN);
            const pAct = getPhrase("activity", aTot > 0 ? (aTot/40)*100 : NaN);
            const pTest = getPhrase("test", test > 0 ? (test/20)*100 : NaN);
            const pProj = getPhrase("project", proj > 0 ? (proj/20)*100 : NaN);
            const pTot = getPhrase("total", grandTot > 0 ? (grandTot/100)*100 : NaN);
            let waMsg = `السلام عليكم ولي أمر الطالب: *${name}*\n\n📊 *تقرير الأداء الأكاديمي في مادة تقنية المعلومات:*\n`;
            waMsg += `- التفاعل والحوار (${dTot}/20): ${pDiag.text}\n- الأنشطة العملية (${aTot}/40): ${pAct.text}\n`;
            waMsg += `- الاختبار القصير (${test}/20): ${pTest.text}\n- المشروع (${proj}/20): ${pProj.text}\n\n`;
            waMsg += `📈 *النتيجة الكلية الحالية:* ${grandTot}/100\n*الخلاصة:* ${pTot.text}\n\nمع تحيات معلم المادة.`;
            
            let isPhoneValid = (cleanPhone.length === 8);
            let fullPhone = isPhoneValid ? '968' + cleanPhone : '';
            container.innerHTML += `
                <div class="student-card search-item">
                    <div class="card-header">
                        <span class="st-title">${num}.
                        ${name}</span>
                        <span style="font-size:14px;">المجموع: ${grandTot}/100</span>
                    </div>
                    <div class="card-body">
                        <div class="cat-box ${pDiag.class}">
                             <div class="cat-title"><span>🗣️ التفاعل والحوار</span> <span class="cat-score">${dTot}/20</span></div>
                            <div class="cat-desc">${pDiag.text}</div>
                        </div>
                         <div class="cat-box ${pAct.class}">
                            <div class="cat-title"><span>💻 الأنشطة العملية</span> <span class="cat-score">${aTot}/40</span></div>
                            <div class="cat-desc">${pAct.text}</div>
                        </div>
                         <div class="cat-box ${pTest.class}">
                            <div class="cat-title"><span>📝 الاختبار القصير</span> <span class="cat-score">${test}/20</span></div>
                            <div class="cat-desc">${pTest.text}</div>
                         </div>
                        <div class="cat-box ${pProj.class}">
                            <div class="cat-title"><span>🚀 المشروع التقني</span> <span class="cat-score">${proj}/20</span></div>
                            <div class="cat-desc">${pProj.text}</div>
                         </div>
                        
                        <div class="whatsapp-section">
                            <label style="font-weight:bold;
                            display:block; margin-bottom:8px; text-align:right;">📱 رقم هاتف ولي الأمر (8 أرقام فقط):</label>
                            <div class="phone-input-wrapper">
                                <span class="phone-prefix">+968</span>
                                 <input type="text" class="modal-phone-input" maxlength="8" value="${cleanPhone}" placeholder="9XXXXXXX" oninput="updatePhoneAndLink('${num}', this.value)">
                            </div>
                            <a href="${isPhoneValid ?
                            `https://api.whatsapp.com/send?phone=${fullPhone}&text=${encodeURIComponent(waMsg)}` : '#'}" target="_blank" id="wa-btn-${num}" class="whatsapp-btn" style="display: ${isPhoneValid ? 'inline-flex' : 'none'};" data-msg="${encodeURIComponent(waMsg)}">💬 إرسال التقرير لولي الأمر عبر واتساب</a>
                            <div id="wa-warn-${num}" style="color:#e74c3c;
                            font-size:13px; margin-top:5px; display: ${isPhoneValid ? 'none' : 'block'}; text-align:right;">⚠️ يرجى إدخال الرقم المكون من 8 خانات ليظهر زر الإرسال.</div>
                        </div>
                    </div>
                </div>
            `;
        });

        document.getElementById('reportsModal').style.display = "block";
    }

    function closeReportsModal() { document.getElementById('reportsModal').style.display = "none"; }

    function filterReports() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('search-item');
        for (let i = 0; i < cards.length; i++) {
            let title = cards[i].querySelector('.st-title').innerText.toLowerCase();
            cards[i].style.display = title.includes(input) ? "" : 
            "none";
        }
    }
</script>

</body>
</html>
